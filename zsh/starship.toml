"$schema" = 'https://starship.rs/config-schema.json'

# ─── Layout ──────────────────────────────────────────────────────
# Line 1: dir + git
# Line 2: kubernetes + azure + python + cmd duration
# Line 3: prompt character
# Right side of line 1: battery + time
format = """
[╭─](grey) $directory$git_branch$git_status${custom.colima}
[│ ](grey)$kubernetes$azure$python$cmd_duration
[╰─](grey)$character"""

right_format = """$battery$time"""

add_newline = true
palette = "cobalt"

# ─── Palette ────────────────────────────────────────────────────
[palettes.cobalt]
cobalt   = "#2D5BFF"
magenta  = "#FF1FE7"
grey     = "#6b7280"
fg       = "#e0e0ee"
amber    = "#F59E0B"
red      = "#FF4D4D"
green    = "#22EE99"
cyan     = "#22D3EE"
purple   = "#c0a3ff"

# ─── Prompt character ───────────────────────────────────────────
[character]
success_symbol = "[❯](bold cobalt)"
error_symbol   = "[✗ ❯](bold magenta)"
vimcmd_symbol  = "[❮](bold green)"

# ─── Directory ──────────────────────────────────────────────────
[directory]
format             = "[ $path ]($style)[$read_only]($read_only_style)"
style              = "bold cobalt"
read_only          = " "
read_only_style    = "magenta"
truncation_length  = 4
truncation_symbol  = "…/"
truncate_to_repo   = true

[directory.substitutions]
"~/Documents/GitHub" = " gh"
"~/work"             = " work"
"~/Code"             = " code"

# ─── Git ────────────────────────────────────────────────────────
[git_branch]
symbol = " "
format = "[on $symbol$branch]($style) "
style  = "magenta"

[git_status]
format    = "([$all_status$ahead_behind]($style) )"
style     = "magenta"
conflicted = "✖ "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
untracked  = "?${count} "
stashed    = "\\$${count} "
modified   = "!${count} "
staged     = "+${count} "
renamed    = "»${count} "
deleted    = "✘${count} "

# ─── Kubernetes ─────────────────────────────────────────────────
[kubernetes]
disabled = false
symbol   = "⎈ "
format   = "[$symbol$context( \\($namespace\\))]($style) "
style    = "cyan"
detect_files = ["k8s", "Chart.yaml"]
[kubernetes.context_aliases]
"arn:aws:eks:.*:.*:cluster/(?P<cluster>[\\w-]+)" = "$cluster"

# ─── Azure ──────────────────────────────────────────────────────
[azure]
disabled = false
symbol   = "󰠅 "
format   = "[$symbol($subscription)]($style) "
style    = "bold cobalt"

# ─── Python ─────────────────────────────────────────────────────
[python]
symbol = " "
format = "[${symbol}${pyenv_prefix}(${version})( \\($virtualenv\\))]($style) "
style  = "green"
detect_extensions = ["py"]
detect_files      = ["pyproject.toml", "requirements.txt", "Pipfile", ".python-version"]

# ─── Command duration ──────────────────────────────────────────
[cmd_duration]
min_time          = 2_000
format            = "[took $duration]($style) "
style             = "amber"
show_milliseconds = false

# ─── Battery (right side of line 1) ─────────────────────────────
[battery]
format = "[$symbol$percentage]($style) "
full_symbol      = "󰁹 "
charging_symbol  = "󰂄 "
discharging_symbol = "󰂃 "
[[battery.display]]
threshold = 20
style     = "bold red"
[[battery.display]]
threshold = 50
style     = "amber"
[[battery.display]]
threshold = 100
style     = "grey"

# ─── Time (right side of line 1) ────────────────────────────────
[time]
disabled    = false
format      = "[ $time ](grey)"
time_format = "%H:%M"

# ─── Disabled by default but listed for easy enable later ──────
[username]
show_always = false
style_user  = "bold cobalt"
format      = "[$user]($style)@"

[hostname]
ssh_only = true
format   = "[$hostname](magenta) "

[aws]
disabled = true

[gcloud]
disabled = true

[nodejs]
disabled = false
symbol   = " "
format   = "[$symbol($version )]($style)"
style    = "green"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[golang]
disabled = false
symbol   = " "
format   = "[$symbol($version )]($style)"
style    = "cyan"

[terraform]
disabled = false
symbol   = "󱁢 "
format   = "[$symbol$workspace]($style) "
style    = "purple"

[docker_context]
disabled = true

[package]
disabled = true

[line_break]
disabled = false

# ─── Custom: Colima/Docker status ───────────────────────────────
# Shows a green 🐳 in the prompt when the colima VM is running, hidden when off.
# Detects via the docker socket file — colima creates it when running, removes
# on stop. A stat() is microseconds, so this never slows the prompt down.
[custom.colima]
description = "Show 🐳 when colima VM is running"
when         = "test -S $HOME/.colima/default/docker.sock"
command      = "echo '🐳'"
format       = "[ $output]($style)"
style        = "bold green"
ignore_timeout = true
