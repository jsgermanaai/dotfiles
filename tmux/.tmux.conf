# ===============================================
# 🚀 Modern tmux Configuration 
# ===============================================

# ===============================================
# 🔧 Basic Settings
# ===============================================

# Set true color support
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support
set -g mouse on

# Set prefix key to Ctrl-a (popular alternative to Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set default shell
set -g default-shell /bin/zsh

# Warp terminal integration
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable Warp features in tmux
set-environment -g WARP_HONOR_PS1 "1"
set-environment -g WARP_IS_LOCAL_SHELL_SESSION "1"

# Increase scrollback buffer size
set -g history-limit 50000

# Display messages for 2 seconds
set -g display-time 2000

# Refresh status line every 5 seconds
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Faster command sequences
set -s escape-time 0

# ===============================================
# 🎨 Theme & Status Bar (Catppuccin Mocha)
# ===============================================

# Status bar colors (Catppuccin Mocha)
set -g status-bg "#1e1e2e"
set -g status-fg "#cdd6f4"

# Window status colors
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-style "fg=#cdd6f4,bg=#313244"

# Pane border colors
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message colors
set -g message-style "fg=#1e1e2e,bg=#89b4fa,bold"
set -g message-command-style "fg=#1e1e2e,bg=#cba6f7,bold"

# ===============================================
# 📊 Status Bar Configuration
# ===============================================

# Status bar position
set -g status-position bottom

# Status bar format
set -g status-left-length 100
set -g status-right-length 100

# Left status: session name and window info
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#313244]#[fg=#cdd6f4,bg=#313244] #I:#P #[fg=#313244,bg=#1e1e2e]"

# Right status: host, date, and time
set -g status-right "#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] %Y-%m-%d #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "

# Window status format
setw -g window-status-format "#[fg=#cdd6f4,bg=#313244] #I #W "
setw -g window-status-current-format "#[fg=#313244,bg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa,bold] #I #W #[fg=#89b4fa,bg=#1e1e2e]"

# ===============================================
# ⌨️  Key Bindings
# ===============================================

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows using Shift-arrow without prefix
bind -n S-Left previous-window
bind -n S-Right next-window

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Copy mode vi bindings
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# Enter copy mode with Prefix + [
bind [ copy-mode

# Paste with Prefix + ]
bind ] paste-buffer

# Quick session switching
bind -r ( switch-client -p
bind -r ) switch-client -n

# Kill pane/window shortcuts
bind x kill-pane
bind X kill-window

# Toggle synchronize panes
bind e setw synchronize-panes

# ===============================================
# 🔌 Plugin Management (TPM)
# ===============================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# ===============================================
# 🔧 Plugin Configuration
# ===============================================

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm,fullscreen'

# vim-tmux-navigator settings
set -g @plugin 'christoomey/vim-tmux-navigator'

# Prefix highlight settings
set -g @prefix_highlight_fg '#1e1e2e'
set -g @prefix_highlight_bg '#f9e2af'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e1e2e,bg=#f38ba8'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'

# Add prefix highlight to right status
set -g status-right "#{prefix_highlight}#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] %Y-%m-%d #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "

# ===============================================
# 🚀 Advanced Features
# ===============================================

# Automatic rename windows based on current program
setw -g automatic-rename on
set -g set-titles on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Don't exit tmux when closing a session
set -g detach-on-destroy off

# ===============================================
# 🔗 Integration Settings
# ===============================================

# Enable RGB colour if running in xterm(1)
set-option -sa terminal-overrides ",xterm-256color:RGB"

# Change the default $TERM to tmux-256color
set -g default-terminal "tmux-256color"

# No bells at all
set -g bell-action none

# Keep windows around after they exit
set -g remain-on-exit off

# Turn the mouse on, but without copy mode dragging
set -g mouse on
unbind -n MouseDrag1Pane
unbind -Tcopy-mode MouseDrag1Pane

# ===============================================
# 💡 Custom Functions
# ===============================================

# Quick session creation for projects
bind-key S command-prompt -p "New session name:" "new-session -s '%%' -c '#{pane_current_path}'"

# Quick window rename
bind-key , command-prompt -p "Rename window:" "rename-window '%%'"

# Quick session rename  
bind-key '$' command-prompt -p "Rename session:" "rename-session '%%'"

# Show all sessions
bind-key s choose-tree -Zs

# ===============================================
# 🎯 Productivity Shortcuts
# ===============================================

# Clear screen and history
bind -n C-k send-keys C-l \; run 'sleep 0.1' \; clear-history

# Quick config edit
bind-key C-e new-window -n 'tmux.conf' "sh -c '\${EDITOR:-nvim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"

# ===============================================
# 🔌 Initialize TPM (keep this line at the very bottom)
# ===============================================
run '~/.tmux/plugins/tpm/tpm'
